<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitacora Victoria Ochoa</title>
    <link rel="icon" href="recursos/img/b08a7d54-7de3-4eb4-afd5-a36ffb58d16d.tmp" style="image/png">
    <style>
      /*CSS=lenguaje de programación(Diseñar en cascada)*/
    html, body{
      height: 100%;
      margin: 0;
      font-family: Arial,sans serif;
  }
  body{display:flex;
  flex-direction: column;
text-align: center;
}
header{padding: 20px;
background-color: rgb(203, 162, 240);
color: rgb(155, 214, 246);
}
main{
  flex: 1;
padding: 20px;
max-width: 1200px;
margin: 0 auto;
background-color: rgb(245, 171, 237);
}
footer{
  display:flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 5opx;
  border-top: 1px solid rgb(214, 176, 250);
  background-color: rgb(198, 242, 242);
}
footer img {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        footer img:hover {
            transform: scale(1.2);
        }
      
@media (max-width: 600px;){
  footer{
    flex-direction: column;
    gap: 15px;
    padding: 20px;
  }
   /* Esto crea el diseño de la tarjeta */
.semana {
    background-color: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    border-left: 5px solid rgb(163, 108, 213);
    text-align: left;
}
/* Esto le da color al título dentro de la tarjeta */
.semana h3 {
    margin: 0 0 10px 0;
    color: rgb(163, 108, 213);
}
}
  header h1{
    color: white;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 
      0 0 5px rgb(255, 237, 251),
      0 0 10px rgb(247, 157, 228),
      0 0 20px rgb(247, 74, 209),
      0 0 40px rgb(255, 0, 200);
  }
    </style>
</head>
<body>
  <header>
    <h1>Bitácora segunda y tercera unidad</h1>
  </header> 
  <main>
    <h4>Bitacora de Computación</h4>

    <!-- Esta es la tarjeta de la semana -->
        <div class="semana">
            <h3>Semana 1</h3>
            <p>Introducción a Arduino</p>
            <div style="width: 100%; height: 500px; margin-top: 15px;">
                <embed src="recursos/Introduccion TICS.pdf" type="application/pdf" width="100%" height="100%" />
            </div>
        </div>
        </div>

        <!-- Si quieres otra semana, solo copias este bloque abajo -->
        <div class="semana">
            <h3>Semana 2</h3>
            <p>Aquí pones el contenido de la siguiente semana.</p>
        </div>
  </main>
  <footer>
    <span>@Vick2008</span>
    <img src="https://www.capouilliez.edu.gt/panel-alumnos/assets/img/brand/capouilliez.svg" height="50" width="200">
  </footer>
</body>
</html>
